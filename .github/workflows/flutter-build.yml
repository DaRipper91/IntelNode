name: Build Flutter APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Build Release APK
        run: |
          # Use settings from CLAUDE.md for optimized ARM64 build
          flutter build apk --release \
            --target-platform android-arm64 \
            --split-per-abi \
            --obfuscate \
            --split-debug-info=./debug_info \
            || echo "Release build failed (likely missing signing config), continuing..."

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DaRipped-APKs
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest DaRipped APK Build
          body: |
            Automated build of the DaRipped Tiny Computer app.
            
            Included builds:
            - **Debug APK**: (Universal) Good for quick testing.
            - **Release APK**: (ARM64-v8a) Optimized for Tensor G4 / Pixel 9. (May be unsigned if signing secrets are not set).
            
            Build ID: ${{ github.run_id }}
            Commit: ${{ github.sha }}
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
